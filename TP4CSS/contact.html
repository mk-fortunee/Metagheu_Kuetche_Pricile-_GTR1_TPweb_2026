<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Contact - Mon - Mini - site </title>
</head>
<body>
    <h1>Page de contact</h1>
    <nav>
        <a href="index.html">Accueil</a>
        <a href="présentation.html">présentation</a>
        <a href="contact.html">contact</a>
    </nav>
    <div class="section">
    <h2>Formulaire de contact</h2>
    <p>veuillez remplir se Formulaire pour envoyer un message.</p>
    </div>
    <form>
        <label for="nom">Nom :</label>
        <input type="text" name="nom" id="nom" placeholder="Entrez votre nom" required>
        <br>
        <br>
        <label for="prénom">prénom :</label>
        <input type="text" name="prénom" id="prénom" placeholder="entrez votre prénom" required>
        <br>
        <br>
        <label for="email">Adresse email :</label>
        <input type="email" name="email" id="email" placeholder="exemple@email.com" required>
        <br>
        <br>
        <label for="telephone">Téléphone :</label>
        <input type="tel" name="teléphone" id="teléphone" placeholder="+237 6 xx xx xx xx">
        <br>
        <br>
        <label for="domaine">Domaine d'intéret :</label>
        <select name="doaine" id="domaine" required>
            <option value="">-- choisir un domaine --</option>
            <option value="réseaux">Réseau informatique</option>
            <option value="cybersécurité">cybersécurité</option>
            <option value="developpement-web">developpement web</option>
            <option value="administration système">Administrateur système</option>
            <option value="intelligence artificielle">Intelligence Artificielle</option>
        </select>
        <label for="motif">Motif du message :</label>
        <select name="motif" id="motif" required>
            <option value="">-- choisir un motif --</option>
            <option value="information">Demande d'information</option>
            <option value="stage">Demande de stage</option>
            <option value="projet">Proposition de projet</option>
            <option value="autre">Autre demande</option>
            </select>
            <br>
            <br>
            <P>statut du visiteur</P>   
            <input type="radio" name="statut" id="etudiant" value="etudiant" required>
            <label for="etudiant">étudiant</label>
            <br>
            <input type="radio" name="statut" id="enseignant" value="enseignant">
            <label for="enseignant">enseignant</label>
            <br>
            <input type="radio" name="statut" id="professionnel" value="professionnel">
            <label for="professionnel">professionnel</label>
            <br>
            <br>

        <label for="message">Message :</label>
        <br>
        <textarea name="message" id="message" rows="5" cols="40" placeholder="Ecrire votre message ici" required></textarea>
        <br>
        <br>
        <input type="checkbox" name="confirmation" id="confirmation" required>
        <label for="confirmation">Je confirme que les informations saisies sont correctes</label>
        <br>
        <br>
        <button type="submit">envoyer</button>
        <button type="reset">Effacer</button>
    </form>
    
</body>
</html>
